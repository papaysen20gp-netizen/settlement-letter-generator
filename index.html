<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Settlement Letter Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#f4f7fb;
  padding:20px;
}
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
.box{
  background:white;
  padding:20px;
  border-radius:10px;
}
input,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
}
button{
  margin-top:10px;
  padding:10px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}
#output{
  white-space:pre-wrap;
  line-height:1.6;
}
</style>

</head>

<body>

<h2>Settlement Letter Generator</h2>

<div class="container">

<div class="box">

<input id="clientName" placeholder="Client Name">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">
<input id="bankName" placeholder="Bank Name">
<input id="loanNumber" placeholder="Loan Number">
<textarea id="reason" placeholder="Reason"></textarea>
<textarea id="location" placeholder="Preferred Address"></textarea>

<input id="advisorName" placeholder="Advisor Name">
<input id="advisorEmail" placeholder="Advisor Email">
<input id="advisorMobile" placeholder="Advisor Mobile">

<button onclick="generateLetter()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div class="box">
<pre id="output"></pre>
</div>

</div>

<script>

function val(id){
 return document.getElementById(id).value || "________";
}

function generateLetter(){

let text = `To
The Manager
${val("bankName")}

SUBJECT: REQUEST FOR SETTLEMENT OF OUTSTANDING DUES FOR PERSONAL LOAN / CREDIT CARD

Respected Sir/Madam,

I, ${val("clientName")}, holding registered mobile number ${val("mobile")} and email ID ${val("email")}, am writing regarding my loan account ${val("loanNumber")}.

Due to financial hardship, I am unable to continue payments.

Reason:
${val("reason")}

I request you to consider settlement.

I also want to clearly mention that I am NOT comfortable meeting any agent at my old address used during loan.

If required, you may contact me only at below address:

${val("location")}

I hereby authorize my legal advisor to handle my case:

Advisor Name: ${val("advisorName")}
Advisor Email: ${val("advisorEmail")}
Advisor Mobile: ${val("advisorMobile")}

Kindly provide settlement details.

Yours faithfully,

${val("clientName")}
`;

document.getElementById("output").innerText = text;

}

function downloadPDF(){

generateLetter();

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let text = document.getElementById("output").innerText;

let lines = doc.splitTextToSize(text,180);

let y=15;

lines.forEach(line=>{
 if(y>280){
  doc.addPage();
  y=15;
 }
 doc.text(line,10,y);
 y+=8;
});

doc.save("settlement-letter.pdf");

}

</script>

</body>
</html>
