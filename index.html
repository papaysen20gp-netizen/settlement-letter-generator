<!DOCTYPE html>
<html>
<head>
<title>Settlement Letter Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body style="font-family: Arial; padding:20px;">

<h2>Settlement Letter Generator</h2>

<input id="name" placeholder="Client Name"><br><br>
<input id="bank" placeholder="Bank Name"><br><br>
<input id="loan" placeholder="Loan Number"><br><br>

<textarea id="reason" placeholder="Reason"></textarea><br><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>

<pre id="output"></pre>

<script>
function generate(){
let name = document.getElementById("name").value;
let bank = document.getElementById("bank").value;
let loan = document.getElementById("loan").value;
let reason = document.getElementById("reason").value;

let text = `Subject: REQUEST FOR SETTLEMENT OF OUTSTANDING DUES

Respected Sir/Madam,

I, ${name}, request settlement of my loan (${loan}) from ${bank}.

Reason:
${reason}

I also request no agent visit at old address. Only contact at new address.

My legal advisor is authorized to handle my case.

Thank you.`;

document.getElementById("output").innerText = text;
}

function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let text = document.getElementById("output").innerText;

doc.text(text, 10, 10);
doc.save("settlement-letter.pdf");
}
</script>

</body>
</html>
